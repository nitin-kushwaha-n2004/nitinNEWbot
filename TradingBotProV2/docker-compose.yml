version: '3.8'

services:
  mongo:
    image: mongo:7
    container_name: tradingbot-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    restart: unless-stopped

  backend:
    build: ./backend
    container_name: tradingbot-backend
    ports:
      - "5000:5000"
    environment:
      - MONGO_URI=mongodb://mongo:27017/tradingbot
    env_file:
      - ./backend/.env
    depends_on:
      - mongo
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: tradingbot-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped

  bot:
    build: ./bot
    container_name: tradingbot-pybot
    env_file:
      - ./bot/.env
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  mongo_data:
